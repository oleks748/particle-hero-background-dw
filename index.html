<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Particle Hero Background</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
    }

    .particle-hero {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #fff;
    }

    #particle-bg {
      display: block;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 900ms ease;
    }

    .particle-hero.is-ready #particle-bg {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main class="particle-hero">
    <canvas id="particle-bg" aria-hidden="true"></canvas>
  </main>

  <script>
    (() => {
      const hero = document.querySelector(".particle-hero");
      const canvas = document.querySelector("#particle-bg");
      const ctx = canvas.getContext("2d", { alpha: true });
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const config = {
        particleCount: prefersReducedMotion ? 560 : 1450,
        shapeParticleShare: .84,
        dotSize: 1.45,
        color: "rgba(28, 94, 190, 0.88)",
        chaosSeconds: 2,
        loopChaosSeconds: 0,
        morphSeconds: 2.45,
        holdSeconds: 1.35,
        iconCanvasSize: 320,
        iconDrawSize: 256,
        iconPixelStep: 2,
        formCenterY: .43,
        formMaxWidth: .48,
        formMaxHeight: .48,
        targetJitter: 3.7,
        holdWobble: 3.6,
      };

      const svgSources = {
        user: `<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_4_2)">
<path d="M128 224C181.019 224 224 181.019 224 128C224 74.9807 181.019 32 128 32C74.9807 32 32 74.9807 32 128C32 181.019 74.9807 224 128 224Z" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M128 160C150.091 160 168 142.091 168 120C168 97.9086 150.091 80 128 80C105.909 80 88 97.9086 88 120C88 142.091 105.909 160 128 160Z" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M63.8 199.37C69.8191 187.514 79.0036 177.557 90.3354 170.601C101.667 163.646 114.704 159.964 128 159.964C141.296 159.964 154.333 163.646 165.665 170.601C176.996 177.557 186.181 187.514 192.2 199.37" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<defs><clipPath id="clip0_4_2"><rect width="256" height="256" fill="white"/></clipPath></defs>
</svg>`,
        file: `<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_4_97)">
<path d="M168 224H56C53.8783 224 51.8434 223.157 50.3431 221.657C48.8429 220.157 48 218.122 48 216V72C48 69.8783 48.8429 67.8434 50.3431 66.3431C51.8434 64.8429 53.8783 64 56 64H136L176 104V216C176 218.122 175.157 220.157 173.657 221.657C172.157 223.157 170.122 224 168 224Z" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M80 64V40C80 37.8783 80.8429 35.8434 82.3431 34.3431C83.8434 32.8429 85.8783 32 88 32H168L208 72V184C208 186.122 207.157 188.157 205.657 189.657C204.157 191.157 202.122 192 200 192H176" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M88 152H136" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M88 184H136" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<defs><clipPath id="clip0_4_97"><rect width="256" height="256" fill="white"/></clipPath></defs>
</svg>`,
        money: `<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_4_86)">
<path d="M128 24V232" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M184 88C184 82.7471 182.965 77.5457 180.955 72.6927C178.945 67.8396 175.999 63.4301 172.284 59.7157C168.57 56.0014 164.16 53.055 159.307 51.0448C154.454 49.0346 149.253 48 144 48H112C101.391 48 91.2172 52.2143 83.7157 59.7157C76.2143 67.2172 72 77.3913 72 88C72 98.6087 76.2143 108.783 83.7157 116.284C91.2172 123.786 101.391 128 112 128H152C162.609 128 172.783 132.214 180.284 139.716C187.786 147.217 192 157.391 192 168C192 178.609 187.786 188.783 180.284 196.284C172.783 203.786 162.609 208 152 208H104C93.3913 208 83.2172 203.786 75.7157 196.284C68.2143 188.783 64 178.609 64 168" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<defs><clipPath id="clip0_4_86"><rect width="256" height="256" fill="white"/></clipPath></defs>
</svg>`,
        logo: `<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M111.708 20.2734C78.7544 25.3085 49.8299 44.9346 32.7851 73.7058C30.7189 77.0971 31.5452 76.4799 37.3304 70.4174C49.1064 57.8818 64.705 49.0446 81.8534 45.3454C85.2624 44.626 93.6295 44.0095 100.447 44.0095C140.632 44.2152 175.135 68.6707 184.123 103.504C186.189 111.417 186.085 127.652 184.019 137.722C179.577 159.506 164.185 176.461 143.421 182.523C136.5 184.578 121.005 184.681 113.877 182.728C100.551 179.235 87.7414 169.781 80.0972 157.965C75.2419 150.258 75.0355 151.388 79.6836 160.945C88.7742 179.44 107.265 194.031 129.373 199.888C142.905 203.587 162.532 203.896 176.581 200.71C202.097 194.854 222.344 177.282 231.125 153.34C241.869 124.158 237.84 94.8736 219.349 67.2326C196.106 32.3983 153.442 13.8002 111.708 20.2734Z" fill="#000C36"/>
<path d="M82.37 55.2099C56.9573 60.245 38.0533 74.836 27.6193 97.339C22.6612 107.923 20.595 115.732 19.4587 127.96C18.2195 140.085 19.4587 149.538 23.5911 162.075C35.5736 197.731 64.0852 224.446 100.758 234.208C109.538 236.572 112.844 236.88 127.823 236.983C142.595 237.086 146.107 236.777 154.165 234.62C166.354 231.434 179.37 225.782 188.874 219.617C199.308 212.835 213.15 198.861 220.175 188.072C226.993 177.694 227.612 175.741 221.828 183.037C205.093 204.101 173.999 215.815 144.868 212.014C123.69 209.239 106.646 201.018 92.0805 186.736C84.4355 179.132 81.9564 175.844 78.4446 168.754C72.3495 156.423 70.5932 148.922 70.6968 135.358C70.9032 115.013 76.4812 100.525 88.6715 88.3997C100.448 76.7885 114.497 71.4454 131.335 72.4727C152.099 73.6029 169.66 85.1113 179.164 103.813C183.296 111.828 180.714 104.121 176.168 94.8729C166.664 75.2468 146.004 60.3479 121.418 55.3128C111.811 53.3603 91.9769 53.2574 82.37 55.2099Z" fill="#000C36"/>
</svg>`,
      };

      let width = 0;
      let height = 0;
      let dpr = 1;
      let particles = [];
      let targets = {};
      let iconMasks = {};
      let nextState = "chaos";
      let transitionStartedAt = 0;
      let lastSwitchAt = 0;
      let startedAt = performance.now();
      let previousFrame = startedAt;
      let firstChaos = true;

      const stateOrder = ["chaos", "user", "file", "money", "logo"];
      const lerp = (a, b, t) => a + (b - a) * t;
      const clamp01 = (n) => Math.max(0, Math.min(1, n));
      const ease = (t) => t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      const rand = (min, max) => min + Math.random() * (max - min);

      function svgToImage(svg) {
        return new Promise((resolve) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
        });
      }

      async function loadMasks() {
        const entries = await Promise.all(
          Object.entries(svgSources).map(async ([name, svg]) => [name, await svgToImage(svg)])
        );
        iconMasks = Object.fromEntries(entries);
      }

      function resize() {
        const previousWidth = width;
        const previousHeight = height;
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        const bounds = canvas.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = bounds.width || window.innerWidth;
        height = bounds.height || window.innerHeight;
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        buildTargets();

        const scaleX = previousWidth ? width / previousWidth : 1;
        const scaleY = previousHeight ? height / previousHeight : 1;
        particles.forEach((particle) => {
          particle.x *= scaleX;
          particle.y *= scaleY;
          particle.fromX *= scaleX;
          particle.fromY *= scaleY;
          particle.targetX *= scaleX;
          particle.targetY *= scaleY;
          particle.x = Math.max(0, Math.min(width, particle.x));
          particle.y = Math.max(0, Math.min(height, particle.y));
        });
      }

      function createParticles() {
        particles = Array.from({ length: config.particleCount }, (_, index) => {
          const x = rand(0, width);
          const y = rand(0, height);
          return {
          index,
          shapeMember: Math.random() < config.shapeParticleShare,
          x,
          y,
          fromX: x,
          fromY: y,
          targetX: rand(0, width),
          targetY: rand(0, height),
          vx: rand(-12, 12),
          vy: rand(-12, 12),
          angle: rand(0, Math.PI * 2),
          speed: rand(4, 10),
          seed: rand(0, 1000),
          curveX: 0,
          curveY: 0,
          curveAmp: 0,
        };
        });
      }

      function iconPoints(name) {
        const offscreen = document.createElement("canvas");
        const size = config.iconCanvasSize;
        const pad = (size - config.iconDrawSize) / 2;
        offscreen.width = size;
        offscreen.height = size;
        const off = offscreen.getContext("2d", { willReadFrequently: true });
        off.clearRect(0, 0, size, size);
        off.drawImage(iconMasks[name], pad, pad, config.iconDrawSize, config.iconDrawSize);

        const pixels = off.getImageData(0, 0, size, size).data;
        const candidates = [];

        for (let y = 0; y < size; y += config.iconPixelStep) {
          for (let x = 0; x < size; x += config.iconPixelStep) {
            const alpha = pixels[(y * size + x) * 4 + 3];
            if (alpha > 18) {
              candidates.push({ x: x - size / 2, y: y - size / 2 });
            }
          }
        }

        const scale = Math.min(width * config.formMaxWidth, height * config.formMaxHeight) / config.iconDrawSize;
        const centerX = width / 2;
        const centerY = height * config.formCenterY;

        return candidates.map((point) => ({
          x: centerX + point.x * scale,
          y: centerY + point.y * scale,
        }));
      }

      function chaosPoint(margin = .075) {
        return {
          x: rand(width * margin, width * (1 - margin)),
          y: rand(height * margin, height * (1 - margin)),
        };
      }

      function buildShapeTargets(points) {
        return Array.from({ length: config.particleCount }, (_, index) => {
          if (particles[index] && !particles[index].shapeMember) return chaosPoint(.03);
          const source = points.length ? points[Math.floor(Math.random() * points.length)] : chaosPoint();
          return {
            x: source.x + rand(-config.targetJitter, config.targetJitter),
            y: source.y + rand(-config.targetJitter, config.targetJitter),
          };
        });
      }

      function buildTargets() {
        targets = {
          chaos: Array.from({ length: config.particleCount }, () => chaosPoint(.035)),
          user: buildShapeTargets(iconPoints("user")),
          file: buildShapeTargets(iconPoints("file")),
          money: buildShapeTargets(iconPoints("money")),
          logo: buildShapeTargets(iconPoints("logo")),
        };
      }

      function setParticleTargets(name) {
        const nextTargets = targets[name];
        particles.forEach((particle) => {
          const target = nextTargets[particle.index % nextTargets.length];
          particle.fromX = particle.x;
          particle.fromY = particle.y;
          particle.targetX = target.x;
          particle.targetY = target.y;

          const dx = target.x - particle.x;
          const dy = target.y - particle.y;
          const distance = Math.hypot(dx, dy) || 1;
          const direction = Math.random() < .5 ? -1 : 1;
          const strength = name === "chaos" ? .34 : .24;
          particle.curveX = (-dy / distance) * direction;
          particle.curveY = (dx / distance) * direction;
          particle.curveAmp = Math.min(Math.max(distance * strength, 48), 170) * rand(.65, 1.25);

          if (name === "chaos") {
            particle.vx += rand(-30, 30);
            particle.vy += rand(-30, 30);
          }
        });
      }

      function switchTo(name, now) {
        nextState = name;
        transitionStartedAt = now;
        lastSwitchAt = now;
        if (name !== "chaos") targets[name] = buildShapeTargets(iconPoints(name));
        if (name === "chaos") targets.chaos = Array.from({ length: config.particleCount }, () => chaosPoint(.02));
        setParticleTargets(name);
      }

      function maybeSwitchState(now) {
        const elapsed = (now - startedAt) / 1000;
        if (nextState === "chaos" && firstChaos) {
          if (elapsed < config.chaosSeconds) return;
          firstChaos = false;
          switchTo("user", now);
          return;
        }

        const duration = nextState === "chaos"
          ? config.morphSeconds + config.loopChaosSeconds
          : config.morphSeconds + config.holdSeconds;

        if ((now - lastSwitchAt) / 1000 < duration) return;

        const currentIndex = stateOrder.indexOf(nextState);
        switchTo(stateOrder[(currentIndex + 1) % stateOrder.length], now);
      }

      function moveChaos(particle, dt, force = 1) {
        particle.angle += rand(-.08, .08) * force;
        particle.vx += Math.cos(particle.angle) * particle.speed * dt * force;
        particle.vy += Math.sin(particle.angle) * particle.speed * dt * force;
        particle.vx *= .987;
        particle.vy *= .987;
        particle.x += particle.vx * dt * 12;
        particle.y += particle.vy * dt * 12;

        if (particle.x < 0 || particle.x > width) {
          particle.vx *= -1;
          particle.x = Math.max(0, Math.min(width, particle.x));
        }

        if (particle.y < 0 || particle.y > height) {
          particle.vy *= -1;
          particle.y = Math.max(0, Math.min(height, particle.y));
        }
      }

      function draw(now) {
        const dt = Math.min((now - previousFrame) / 1000, .05);
        previousFrame = now;
        maybeSwitchState(now);

        const morphProgress = clamp01((now - transitionStartedAt) / (config.morphSeconds * 1000));
        const easedProgress = ease(morphProgress);

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = config.color;
        ctx.globalAlpha = 1;

        particles.forEach((particle) => {
          const isFreeParticle = nextState !== "chaos" && !particle.shapeMember;

          if (isFreeParticle || (nextState === "chaos" && morphProgress >= 1)) {
            moveChaos(particle, dt, isFreeParticle ? .72 : 1);
          } else {
            const bend = Math.sin(Math.PI * easedProgress);
            const turbulentX = Math.sin(now * .0014 + particle.seed) * 11 * bend;
            const turbulentY = Math.cos(now * .0012 + particle.seed * 1.7) * 11 * bend;
            const wobbleX = Math.sin(now * .0018 + particle.seed) * config.holdWobble;
            const wobbleY = Math.cos(now * .0016 + particle.seed * 1.31) * config.holdWobble;
            const movingOut = nextState === "chaos" ? 1 - easedProgress : 1;

            particle.x =
              lerp(particle.fromX, particle.targetX, easedProgress) +
              particle.curveX * particle.curveAmp * bend +
              turbulentX * movingOut +
              wobbleX * easedProgress;
            particle.y =
              lerp(particle.fromY, particle.targetY, easedProgress) +
              particle.curveY * particle.curveAmp * bend +
              turbulentY * movingOut +
              wobbleY * easedProgress;

            if (nextState === "chaos") {
              particle.vx += Math.sin(now * .001 + particle.seed) * dt * 16;
              particle.vy += Math.cos(now * .001 + particle.seed) * dt * 16;
            }
          }

          ctx.beginPath();
          ctx.arc(particle.x, particle.y, config.dotSize, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.globalAlpha = 1;
        if (!prefersReducedMotion) requestAnimationFrame(draw);
      }

      window.addEventListener("resize", () => {
        resize();
        setParticleTargets(nextState);
      }, { passive: true });

      async function init() {
        await loadMasks();
        requestAnimationFrame((now) => {
          resize();
          createParticles();
          buildTargets();
          startedAt = now;
          previousFrame = now;
          transitionStartedAt = now;
          lastSwitchAt = now;
          draw(now);
          hero.classList.add("is-ready");
        });
      }

      init();
    })();
  </script>
</body>
</html>
